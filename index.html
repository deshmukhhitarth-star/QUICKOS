<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickOS - Login</title>
    <!-- અહીં આપણે CSS ફાઈલને જોડી છે -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ડાબી બાજુનો ભાગ -->
    <div class="left-panel">
        <h1>QuickOS</h1>
        <p class="subtitle">Quick Print & Digital Service</p>
        <p class="tagline">Manage your business<br>easily and smartly.</p>
    </div>

    <!-- જમણી બાજુનો ભાગ (લોગિન ફોર્મ) -->
    <div class="right-panel">
        <div class="login-box">
            <h2>Welcome Back!</h2>
            <p class="login-desc">Login to your account</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

              <button type="button" class="login-btn">Login</button>
            </form>
            
            <p class="copyright">© 2026 QuickOS. All rights reserved.</p>
        </div>
    </div>

    <!-- અહીં આપણે JavaScript ફાઈલને જોડી છે -->
    <script src="script.js"></script>
</body>
</html>
